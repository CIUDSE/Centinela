<!-- PANEL 6 — Heist Mission: Panel Cables -->
<section class="panel panel--cables">
  <h2 class="panel__title">🔌 Heist Mission — Panel de Cables</h2>
  <p class="instruccion">
    Ingresa los cables de izquierda a derecha, separados por coma.<br />
    <small>Válidos: rojo, blanco, azul, amarillo, negro</small>
  </p>
  <div class="cables__input-group">
    <input
      type="text"
      id="cables-input"
      class="cables__input"
      placeholder="Ej: azul, rojo, amarillo"
    />
    <button class="btn btn--analizar" onclick="analizarCables()">
      Analizar
    </button>
  </div>
  <div id="cables-resultado" class="cables__resultado oculto">
    <span class="cables__resultado-label">✂️ Cortar cable</span>
    <span id="cables-numero" class="cables__numero"></span>
    <span id="cables-color" class="cables__color-badge"></span>
  </div>
  <div id="cables-error" class="error-box oculto"></div>
</section>
