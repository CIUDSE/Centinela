<section class="panel panel--snackrun">
  <h2 class="panel__title">❌ Error 2: Snack Run</h2>
  <p class="instruccion">
    Selecciona los segmentos encendidos en cada dígito (3 filas × 4 columnas)
    tal como aparecen en el ciclo del display de la máquina.
  </p>

  <div id="err2-rows" class="err2-rows"></div>

  <div class="err2-btns">
    <button class="btn btn--analizar" id="err2-reset">Reset</button>
    <button id="err2-demo" class="btn btn--demo">
      Cargar ejemplo del manual
    </button>
    <button class="btn" id="err2-copy">Copiar secuencia</button>
  </div>

  <div class="err2-resultado">
    <span class="err2-resultado-label">XOR por columna</span>
    <div id="err2-result" class="err2-bytes"></div>
  </div>

  <div id="err2-seq" class="err2-secuencia"></div>
</section>
